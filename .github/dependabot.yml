version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Kolkata
    labels:
      - dependencies
      - github-actions
    open-pull-requests-limit: 5

  - package-ecosystem: gradle
    directory: /apps/android
    schedule:
      interval: weekly
      day: monday
      time: "04:15"
      timezone: Asia/Kolkata
    labels:
      - dependencies
      - android
    open-pull-requests-limit: 5
    groups:
      android-dependencies:
        patterns:
          - "*"

  - package-ecosystem: nuget
    directory: /apps/windows
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: Asia/Kolkata
    labels:
      - dependencies
      - windows
    open-pull-requests-limit: 5
    groups:
      windows-dependencies:
        patterns:
          - "*"
