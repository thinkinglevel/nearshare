name: CodeQL

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "37 3 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: csharp
            os: windows-latest
            working-directory: apps/windows
            build-command: dotnet build PCMobileLink.Windows.sln --configuration Debug
          - language: java-kotlin
            os: ubuntu-latest
            working-directory: apps/android
            build-command: ./gradlew --no-daemon :app:assembleDebug

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: apps/windows/global.json

      - name: Set up JDK
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            apps/android/**/*.gradle*
            apps/android/gradle/wrapper/gradle-wrapper.properties

      - name: Install Android SDK components
        if: matrix.language == 'java-kotlin'
        working-directory: apps/android
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle wrapper executable
        if: matrix.language == 'java-kotlin'
        working-directory: apps/android
        run: chmod +x gradlew

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: manual

      - name: Build for CodeQL
        working-directory: ${{ matrix.working-directory }}
        run: ${{ matrix.build-command }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
