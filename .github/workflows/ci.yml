name: CI

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android build and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    defaults:
      run:
        working-directory: apps/android

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            apps/android/**/*.gradle*
            apps/android/gradle/wrapper/gradle-wrapper.properties

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run Android unit tests
        run: ./gradlew --no-daemon :app:testDebugUnitTest

      - name: Build Android debug APK
        run: ./gradlew --no-daemon :app:assembleDebug

  windows:
    name: Windows build and tests
    runs-on: windows-latest
    timeout-minutes: 45

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"

    defaults:
      run:
        working-directory: apps/windows

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: apps/windows/global.json

      - name: Restore Windows solution
        run: dotnet restore PCMobileLink.Windows.sln

      - name: Build Windows solution
        run: dotnet build PCMobileLink.Windows.sln --configuration Debug --no-restore

      - name: Run Windows tests
        run: dotnet test PCMobileLink.Windows.sln --configuration Debug --no-build --verbosity normal
